services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: f1backend
      POSTGRES_USER: f1backend
      POSTGRES_PASSWORD: f1backend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1backend"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/f1backend
      DB_USER: f1backend
      DB_PASSWORD: f1backend
      JWT_SECRET: change-this-to-a-secure-256-bit-secret-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
